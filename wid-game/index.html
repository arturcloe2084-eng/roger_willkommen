<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrenador de Fundas</title>
  <meta name="description"
    content="Entrena fundas multilingües para contratos reales. Anmeldung 2026 — Bürgeramt Berlin." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&family=VT323:wght@400&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      width: 100dvw;
      height: 100dvh;
      background:
        radial-gradient(circle at 20% 10%, rgba(0, 210, 255, 0.08), transparent 50%),
        radial-gradient(circle at 80% 90%, rgba(0, 100, 150, 0.12), transparent 40%),
        linear-gradient(180deg, #050a0f, #030608);
      overflow: hidden;
    }

    #ui-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      image-rendering: auto;
    }


    /* Efecto sutil de scanlines (reducido para estilo NEUROVITA) */
    #game-container::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%);
      z-index: 1000;
      opacity: 0.2;
      background-size: 100% 4px;
      pointer-events: none;
    }

    /* Viñeta dinámia */
    #game-container::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(18, 16, 16, 0) 54%, rgba(0, 0, 0, 0.32) 100%);
      z-index: 1001;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="game-container">
    <div id="ui-overlay"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>

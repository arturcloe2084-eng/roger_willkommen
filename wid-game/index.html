<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Willkommen in Deutschland 🇩🇪</title>
  <meta name="description"
    content="Aprende alemán viviendo los problemas reales de mudarte a Alemania. Vecinos, burocracia, supermercado." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 8px;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: min(800px, calc(100vw - 16px), calc((100vh - 16px) * 8 / 5), calc((100dvh - 16px) * 8 / 5));
      aspect-ratio: 8 / 5;
      border: 3px solid #00ff41;
      box-shadow: 0 0 30px #00ff41, 0 0 60px #00ff4133;
      overflow: hidden;
    }

    #ui-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    @media (max-width: 820px), (max-height: 540px) {
      body {
        padding: 4px;
      }

      #game-container {
        width: min(800px, calc(100vw - 8px), calc((100vh - 8px) * 8 / 5), calc((100dvh - 8px) * 8 / 5));
        border-width: 2px;
        box-shadow: 0 0 20px #00ff41cc, 0 0 36px #00ff4126;
      }
    }

    /* Efecto CRT Scanlines */
    #game-container::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 1000;
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
    }

    /* Viñeta dinámia */
    #game-container::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: radial-gradient(circle, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 100%);
      z-index: 1001;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="game-container">
    <div id="ui-overlay"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
